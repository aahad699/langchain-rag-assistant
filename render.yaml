# Render blueprint — https://render.com/docs/blueprint-spec
# Deploy with: push this repo to GitHub, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at the repo. Render reads this file.
services:
  - type: web
    name: rag-knowledge-assistant
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Set the actual value in the Render dashboard (Environment tab).
      # sync: false keeps the secret out of this file / version control.
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 8000
